name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test
      - run: npm run lint
      - run: node src/cli.js examples/run.json
      - run: docker build -t qa-autopilot-quality-gates:ci .
